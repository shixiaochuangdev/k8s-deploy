apiVersion: v1
kind: Service
metadata:
  name: rook-ui
  namespace: rook-ceph
  labels:
    app: rook-ceph-mgr
    rook_cluster: rook-ceph
spec:
  type: NodePort
  ports:
    - name: https-dashboard
      port: 8443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP
  selector:
    app: rook-ceph-mgr
    mgr_role: active
    rook_cluster: rook-ceph